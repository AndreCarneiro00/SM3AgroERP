spring:
  application:
    name: SM3AgroERP

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  flyway:
    enabled: true

server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
