spring:
  datasource:
    url: jdbc:sqlite:target/test-db.sqlite?foreign_keys=on&journal_mode=WAL&busy_timeout=5000
    hikari:
      maximum-pool-size: 1

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false
